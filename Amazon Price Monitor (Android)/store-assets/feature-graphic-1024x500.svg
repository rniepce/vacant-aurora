<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <!-- Play Store feature graphic, 1024x500. -->
  <rect width="1024" height="500" fill="#232F3E"/>

  <!-- Text block -->
  <text x="80" y="230" font-family="Roboto, Arial, sans-serif" font-size="76" font-weight="700" fill="#FFFFFF">Radar de Preços</text>
  <text x="82" y="290" font-family="Roboto, Arial, sans-serif" font-size="30" fill="#C9D1D9">Monitore quedas de preço no seu carrinho da Amazon</text>

  <!-- Price-drop arrow motif on the right -->
  <g transform="translate(800,150) scale(2.0)">
    <path d="M46,24 h16 v32 h10 l-18,24 l-18,-24 h10 z" fill="#FF9900"/>
  </g>

  <!-- Small price tags -->
  <text x="84" y="360" font-family="Roboto, Arial, sans-serif" font-size="28" font-weight="700" fill="#FF9900">R$ 8.799,00  ↓ 5,4%</text>
</svg>
